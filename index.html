<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidMachine Supply Sales Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:       #0f1117;
    --surface:  #181c27;
    --card:     #1e2336;
    --border:   #2a2f45;
    --accent:   #4f7cff;
    --accent2:  #34d399;
    --accent3:  #f59e0b;
    --accent4:  #f87171;
    --text:     #e8eaf0;
    --muted:    #6b7280;
    --pill-bg:  #252b40;
    --radius:   10px;
    --font:     -apple-system, 'Segoe UI', system-ui, sans-serif;
    --mono:     'SF Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }

  /* ── Layout ── */
  .shell { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { flex: 1; padding: 2rem 2.5rem; overflow-x: hidden; }

  /* ── Sidebar ── */
  .sidebar-logo { padding: 0 1.25rem 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
  .sidebar-logo .wordmark { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: .02em; }
  .sidebar-logo .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .sidebar-section { padding: 0 1.25rem; margin-bottom: .25rem; }
  .sidebar-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: .5rem; padding: 0 .25rem; }
  .rep-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 10px; border-radius: 7px; border: none; background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; text-align: left; transition: background .12s, color .12s; }
  .rep-btn:hover { background: var(--card); color: var(--text); }
  .rep-btn.active { background: var(--accent); color: #fff; }
  .rep-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
  .rep-btn.active .rep-avatar { background: rgba(255,255,255,.2); }
  .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 1rem 1.25rem; }
  .add-rep-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 10px; margin: 0 0 0 0; border-radius: 7px; border: 1px dashed var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; text-align: left; transition: border-color .12s, color .12s; }
  .add-rep-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Header ── */
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
  .page-header-left .rep-name { font-size: 22px; font-weight: 600; }
  .page-header-left .page-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .period-tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 3px; }
  .period-tab { padding: 6px 14px; border-radius: 7px; border: none; background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; transition: background .12s, color .12s; }
  .period-tab.active { background: var(--card); color: var(--text); font-weight: 500; }

  /* ── Stat cards ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.125rem; cursor: pointer; transition: border-color .15s, transform .1s; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent-color, var(--accent)); }
  .stat-card:hover { border-color: var(--accent-color, var(--accent)); transform: translateY(-1px); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-weight: 700; color: var(--text); line-height: 1; font-variant-numeric: tabular-nums; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }

  /* ── Chart ── */
  .chart-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 2rem; }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .chart-title { font-size: 13px; font-weight: 600; }
  .chart-legend { display: flex; gap: 16px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .chart-wrap { height: 180px; position: relative; }

  /* ── Stage breakdown ── */
  .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 1rem; }
  .stage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; margin-bottom: 2rem; }
  .stage-pill { display: flex; align-items: center; justify-content: space-between; background: var(--pill-bg); border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; cursor: pointer; transition: border-color .12s; }
  .stage-pill:hover { border-color: var(--accent); }
  .stage-pill-name { font-size: 12px; color: var(--text); }
  .stage-pill-count { font-size: 13px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }

  /* ── Drawer overlay ── */
  .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100; }
  .drawer-overlay.open { display: block; }
  .drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 480px; max-width: 95vw; background: var(--surface); border-left: 1px solid var(--border); z-index: 101; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .22s cubic-bezier(.4,0,.2,1); }
  .drawer.open { transform: translateX(0); }
  .drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .drawer-title { font-size: 14px; font-weight: 600; }
  .drawer-count { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .drawer-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; padding: 2px; }
  .drawer-close:hover { color: var(--text); }
  .drawer-body { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
  .drawer-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .drawer-item:last-child { border-bottom: none; }
  .drawer-item-name { font-size: 13px; font-weight: 500; }
  .drawer-item-name a { color: var(--accent); text-decoration: none; }
  .drawer-item-name a:hover { text-decoration: underline; }
  .drawer-item-meta { display: flex; gap: 12px; margin-top: 4px; flex-wrap: wrap; }
  .drawer-meta-tag { font-size: 11px; color: var(--muted); }
  .drawer-meta-amount { font-size: 11px; color: var(--accent2); font-weight: 500; }
  .drawer-item-notes { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .drawer-empty { font-size: 13px; color: var(--muted); padding: 2rem 0; text-align: center; }

  /* ── Footer ── */
  .page-footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem; }
  .footer-text { font-size: 11px; color: var(--muted); }
  .footer-link { font-size: 11px; color: var(--accent); text-decoration: none; }
  .footer-link:hover { text-decoration: underline; }

  /* ── Loading / error ── */
  .state-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 12px; color: var(--muted); }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .sidebar { display: none; }
    .main { padding: 1.25rem; }
    .stat-value { font-size: 24px; }
    .drawer { width: 100vw; }
  }
</style>
</head>
<body>

<div class="shell">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="wordmark">BidMachine</div>
      <div class="sub">Supply Sales Dashboard</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Sales reps</div>
      <div id="rep-list"></div>
    </div>
    <hr class="sidebar-divider">
    <div class="sidebar-section">
      <button class="add-rep-btn" onclick="showAddRepInfo()">
        <span style="font-size:16px">+</span> Add a rep
      </button>
    </div>
  </nav>

  <!-- Main -->
  <main class="main" id="main">
    <div class="state-center" id="loading-state">
      <div class="spinner"></div>
      <div>Loading sales data…</div>
    </div>
    <div id="dashboard" style="display:none"></div>
  </main>
</div>

<!-- Drawer -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <div class="drawer-title" id="drawer-title"></div>
      <div class="drawer-count" id="drawer-count"></div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let DATA = null;
let currentRepIdx = 0;
let currentPeriod = 'week';
let chartInstance = null;
let currentChartType = 'bar';

const PERIOD_LABELS = { week: 'Last week', month: 'Last month', quarter: 'This quarter', last_quarter: 'Last quarter', year: 'Year to date' };

const STAT_CONFIG = [
  { key: 'deals_touched',   label: 'Deals touched',          color: '#4f7cff', detail: 'deals_touched' },
  { key: 'new_deals',       label: 'New deals',               color: '#34d399', detail: 'new_deals' },
  { key: 'stage_progressed',label: 'Deals progressed',        color: '#818cf8', detail: 'stage_progressed' },
  { key: 'qualified_out',   label: 'Qualified out',           color: '#f87171', detail: 'qualified_out' },
  { key: 'meetings',        label: 'Meetings',                color: '#a78bfa', detail: 'meetings' },
  { key: 'linkedin',        label: 'LinkedIn messages',       color: '#0ea5e9', detail: 'linkedin' },
  { key: 'new_companies',   label: 'New companies',           color: '#f59e0b', detail: 'new_companies' },
  { key: 'dau_us_added',    label: 'Deals with US DAU',       color: '#34d399', detail: 'dau_us_added' },
  { key: 'dau_tier1_added', label: 'Deals with Tier 1 DAU',   color: '#6ee7b7', detail: 'dau_tier1_added' },
  { key: 'peer_sdk',        label: 'Peer SDK qualified',      color: '#c084fc', detail: 'peer_sdk' },
];

// ── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  try {
    const res = await fetch('./data/sales_data.json?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    DATA = await res.json();
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    buildSidebar();
    render();
  } catch (e) {
    document.getElementById('loading-state').innerHTML = `
      <div style="color:#f87171;font-size:13px">Could not load sales_data.json</div>
      <div style="color:var(--muted);font-size:12px;max-width:320px;text-align:center">
        Run <code style="background:var(--card);padding:2px 6px;border-radius:4px">python fetch_data.py</code>
        then push to GitHub, or check the console for errors.
      </div>`;
  }
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('rep-list');
  list.innerHTML = DATA.reps.map((r, i) => {
    const initials = r.rep.name.split(' ').map(n => n[0]).join('').slice(0, 2);
    return `<button class="rep-btn ${i === 0 ? 'active' : ''}" onclick="selectRep(${i})">
      <div class="rep-avatar">${initials}</div>
      <span>${r.rep.name}</span>
    </button>`;
  }).join('');
}

function selectRep(idx) {
  currentRepIdx = idx;
  document.querySelectorAll('.rep-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  if (currentPeriod === 'compare') { renderCompare(); return; }
  const rep = DATA.reps[currentRepIdx];
  const period = rep.periods[currentPeriod];
  const dash = document.getElementById('dashboard');

  dash.innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <div class="rep-name">${rep.rep.name}</div>
        <div class="page-sub">Updated ${DATA.generated_date} · ${PERIOD_LABELS[currentPeriod]}</div>
      </div>
      <div class="period-tabs">
        ${['week','month','quarter','last_quarter','year','compare'].map(p => `
          <button class="period-tab ${p === currentPeriod ? 'active' : ''}" onclick="selectPeriod('${p}')">${p === 'compare' ? 'Q vs Q' : PERIOD_LABELS[p]}</button>
        `).join('')}
      </div>
    </div>

    ${period.stats.ooo_days > 0 ? `
    <div style="display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-left:3px solid #f87171;border-radius:var(--radius);padding:8px 14px;margin-bottom:1.25rem">
      <span style="font-size:13px;color:#f87171;font-weight:500">⚠ ${period.stats.ooo_days} working day${period.stats.ooo_days !== 1 ? 's' : ''} out of office this period</span>
      <span style="font-size:12px;color:var(--muted)">${period.detail.ooo ? period.detail.ooo.map(o=>o.date).join(', ') : ''}</span>
    </div>` : ''}

    <div class="stats-grid">
      ${STAT_CONFIG.map(s => {
        const val = period.stats[s.key] || 0;
        return `<div class="stat-card" style="--accent-color:${s.color}" onclick="openDrawer('${s.key}', '${s.label}')">
          <div class="stat-label">${s.label}</div>
          <div class="stat-value">${val}</div>
          <div class="stat-sub">↗ click to view</div>
        </div>`;
      }).join('')}
    </div>

    <div class="chart-section">
      <div class="chart-header">
        <div class="chart-title">${chartTitle()}</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#4f7cff"></div>Deals</div>
            <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>New deals</div>
            <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>Meetings</div>
          </div>
          <div style="display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:3px">
            <button onclick="setChartType('bar')" id="btn-bar" style="padding:4px 10px;border-radius:6px;border:none;font-size:11px;cursor:pointer;background:${currentChartType==='bar'?'var(--card)':'transparent'};color:${currentChartType==='bar'?'var(--text)':'var(--muted)'}">Bar</button>
            <button onclick="setChartType('pie')" id="btn-pie" style="padding:4px 10px;border-radius:6px;border:none;font-size:11px;cursor:pointer;background:${currentChartType==='pie'?'var(--card)':'transparent'};color:${currentChartType==='pie'?'var(--text)':'var(--muted)'}">Pie</button>
          </div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="activity-chart"></canvas></div>
    </div>

    <div class="section-title">Stage breakdown — deals touched this ${currentPeriod === 'week' ? 'week' : currentPeriod}</div>
    <div class="stage-grid">
      ${renderStagePills(period)}
    </div>

    <div class="page-footer">
      <div class="footer-text">BidMachine Supply Sales Dashboard · data via HubSpot API</div>
      <a class="footer-link" href="https://app.hubspot.com/contacts/5606823/objects/0-3/?hubspot_owner_id=${rep.rep.id}" target="_blank" rel="noopener">View in HubSpot ↗</a>
    </div>`;

  renderChart(rep);
}

function chartTitle() {
  if (currentPeriod === 'week')    return 'Activity this month — weekly view';
  if (currentPeriod === 'month')   return 'Activity this month — by week';
  if (currentPeriod === 'quarter') return 'Activity this quarter — by month';
  return 'Activity this year — by quarter';
}

function chartDataKey() {
  if (currentPeriod === 'week' || currentPeriod === 'month') return 'month';
  if (currentPeriod === 'quarter' || currentPeriod === 'last_quarter') return 'quarter';
  return 'year';
}

function setChartType(type) {
  currentChartType = type;
  const rep = DATA.reps[currentRepIdx];
  if (currentPeriod === 'compare') {
    renderCompare();
  } else {
    renderChart(rep);
    // re-render toggle buttons
    document.querySelectorAll('[id^="btn-"]').forEach(b => {
      const isActive = b.id === `btn-${type}`;
      b.style.background = isActive ? 'var(--card)' : 'transparent';
      b.style.color = isActive ? 'var(--text)' : 'var(--muted)';
    });
  }
}

function renderChart(rep) {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const key = chartDataKey();
  const cd = rep.charts[key];
  const ctx = document.getElementById('activity-chart');
  if (!ctx || !cd) return;

  const PIE_COLORS = ['#4f7cff','#34d399','#a78bfa','#f59e0b','#f87171','#0ea5e9'];

  if (currentChartType === 'pie') {
    // For pie: show breakdown of deals touched by metric for the period
    const period = rep.periods[currentPeriod] || rep.periods['week'];
    const s = period.stats;
    const labels = ['Deals touched','New deals','Qual. out','Meetings','LinkedIn','New cos','Tier 1 DAU','Peer SDK'];
    const values = [s.deals_touched, s.new_deals, s.qualified_out, s.meetings, s.linkedin, s.new_companies, s.dau_tier1_added, s.peer_sdk];
    chartInstance = new Chart(ctx, {
      type: 'pie',
      data: {
        labels,
        datasets: [{ data: values, backgroundColor: PIE_COLORS, borderColor: '#0f1117', borderWidth: 2 }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { color: '#9ca3af', font: { size: 11 }, padding: 12, boxWidth: 12 } },
          tooltip: { backgroundColor: '#1e2336', titleColor: '#e8eaf0', bodyColor: '#9ca3af', borderColor: '#2a2f45', borderWidth: 1 },
        },
      },
    });
  } else {
    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: cd.labels,
        datasets: [
          { label: 'Deals touched', data: cd.deals,     backgroundColor: '#4f7cff', borderRadius: 4, borderSkipped: false },
          { label: 'New deals',     data: cd.new_deals,  backgroundColor: '#34d399', borderRadius: 4, borderSkipped: false },
          { label: 'Meetings',      data: cd.meetings,   backgroundColor: '#a78bfa', borderRadius: 4, borderSkipped: false },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: '#1e2336', titleColor: '#e8eaf0', bodyColor: '#9ca3af', borderColor: '#2a2f45', borderWidth: 1 },
        },
        scales: {
          x: { grid: { color: '#2a2f45' }, ticks: { color: '#6b7280', font: { size: 11 } } },
          y: { grid: { color: '#2a2f45' }, ticks: { color: '#6b7280', font: { size: 11 }, precision: 0 }, beginAtZero: true },
        },
      },
    });
  }
}

function renderStagePills(period) {
  const stages = period.detail.stage_summary || {};
  if (!Object.keys(stages).length) return '<div style="color:var(--muted);font-size:13px">No stage data for this period.</div>';
  return Object.entries(stages)
    .sort((a, b) => b[1].length - a[1].length)
    .map(([stage, deals]) => `
      <div class="stage-pill" onclick="openStageDrawer('${encodeURIComponent(stage)}')">
        <span class="stage-pill-name">${stage}</span>
        <span class="stage-pill-count">${deals.length}</span>
      </div>
    `).join('');
}

function selectPeriod(p) {
  currentPeriod = p;
  render();
}

// ── Drawer ────────────────────────────────────────────────────────────────────
function openDrawer(key, label) {
  const rep = DATA.reps[currentRepIdx];
  const period = rep.periods[currentPeriod];
  const items = period.detail[key] || [];

  document.getElementById('drawer-title').textContent = label;
  document.getElementById('drawer-count').textContent = `${items.length} item${items.length !== 1 ? 's' : ''} · ${PERIOD_LABELS[currentPeriod]}`;

  const body = document.getElementById('drawer-body');
  if (!items.length) {
    body.innerHTML = '<div class="drawer-empty">No activity in this period.</div>';
  } else if (key === 'meetings') {
    body.innerHTML = items.map(m => `
      <div class="drawer-item">
        <div class="drawer-item-name">${m.title || 'Meeting'}</div>
        <div class="drawer-item-meta">
          <span class="drawer-meta-tag">${m.date}</span>
          ${m.outcome ? `<span class="drawer-meta-tag">${m.outcome}</span>` : ''}
        </div>
        ${m.notes ? `<div class="drawer-item-notes">${m.notes}</div>` : ''}
      </div>`).join('');
  } else if (key === 'linkedin') {
    body.innerHTML = items.map(n => `
      <div class="drawer-item">
        <div class="drawer-item-meta"><span class="drawer-meta-tag">${n.date}</span></div>
        <div class="drawer-item-notes">${n.text}</div>
      </div>`).join('');
  } else if (key === 'stage_progressed') {
    body.innerHTML = items.length ? items.map(d => `
      <div class="drawer-item">
        <div class="drawer-item-name"><a href="${d.url}" target="_blank" rel="noopener">${d.name}</a></div>
        <div class="drawer-item-meta">
          <span class="drawer-meta-tag">${d.date}</span>
          ${d.progression ? `<span style="font-size:11px;color:#818cf8;font-weight:500">${d.progression}</span>` : ''}
          ${d.amount ? `<span class="drawer-meta-amount">$${Number(d.amount).toLocaleString('en-US',{maximumFractionDigits:0})}</span>` : ''}
        </div>
      </div>`).join('') : '<div class="drawer-empty">No deals progressed in this period.</div>';
  } else if (key === 'new_companies') {
    body.innerHTML = items.map(c => `
      <div class="drawer-item">
        <div class="drawer-item-name"><a href="${c.url}" target="_blank" rel="noopener">${c.name || '—'}</a></div>
        <div class="drawer-item-meta">
          <span class="drawer-meta-tag">${c.date}</span>
          ${c.domain ? `<span class="drawer-meta-tag">${c.domain}</span>` : ''}
        </div>
      </div>`).join('');
  } else {
    body.innerHTML = items.map(d => {
      const dauUs    = d.dau_us    ? `<span class="drawer-meta-tag">US DAU: ${Number(d.dau_us).toLocaleString()}</span>` : '';
      const dauT1    = d.dau_tier1 ? `<span class="drawer-meta-tag">Tier 1 DAU: ${Number(d.dau_tier1).toLocaleString()}</span>` : '';
      const amt      = d.amount    ? `<span class="drawer-meta-amount">$${Number(d.amount).toLocaleString('en-US', {maximumFractionDigits:0})}</span>` : '';
      return `<div class="drawer-item">
        <div class="drawer-item-name"><a href="${d.url}" target="_blank" rel="noopener">${d.name}</a></div>
        <div class="drawer-item-meta">
          <span class="drawer-meta-tag">${d.date}</span>
          ${d.stage ? `<span class="drawer-meta-tag">${d.stage}</span>` : ''}
          ${amt}${dauUs}${dauT1}
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function openStageDrawer(encodedStage) {
  const stage = decodeURIComponent(encodedStage);
  const rep = DATA.reps[currentRepIdx];
  const period = rep.periods[currentPeriod];
  const items = (period.detail.stage_summary || {})[stage] || [];

  document.getElementById('drawer-title').textContent = stage;
  document.getElementById('drawer-count').textContent = `${items.length} deal${items.length !== 1 ? 's' : ''} · ${PERIOD_LABELS[currentPeriod]}`;

  const body = document.getElementById('drawer-body');
  body.innerHTML = items.length ? items.map(d => {
    const dauUs  = d.dau_us    ? `<span class="drawer-meta-tag">US DAU: ${Number(d.dau_us).toLocaleString()}</span>` : '';
    const dauT1  = d.dau_tier1 ? `<span class="drawer-meta-tag">Tier 1 DAU: ${Number(d.dau_tier1).toLocaleString()}</span>` : '';
    const amt    = d.amount    ? `<span class="drawer-meta-amount">$${Number(d.amount).toLocaleString('en-US', {maximumFractionDigits:0})}</span>` : '';
    return `<div class="drawer-item">
      <div class="drawer-item-name"><a href="${d.url}" target="_blank" rel="noopener">${d.name}</a></div>
      <div class="drawer-item-meta">
        <span class="drawer-meta-tag">${d.modified}</span>
        ${amt}${dauUs}${dauT1}
      </div>
    </div>`;
  }).join('') : '<div class="drawer-empty">No deals.</div>';

  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function renderCompare() {
  const rep = DATA.reps[currentRepIdx];
  const cd = rep.charts.quarter_vs_last;
  const cq = rep.periods.quarter.stats;
  const lq = rep.periods.last_quarter.stats;
  const dash = document.getElementById('dashboard');

  const delta = (curr, prev) => {
    if (!prev) return '';
    const diff = curr - prev;
    const pct = prev > 0 ? Math.round((diff / prev) * 100) : 0;
    const color = diff >= 0 ? 'var(--accent2)' : 'var(--accent4)';
    const arrow = diff >= 0 ? '↑' : '↓';
    return `<span style="font-size:11px;color:${color};margin-left:6px">${arrow}${Math.abs(pct)}%</span>`;
  };

  dash.innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <div class="rep-name">${rep.rep.name}</div>
        <div class="page-sub">Updated ${DATA.generated_date} · This quarter vs last quarter</div>
      </div>
      <div class="period-tabs">
        ${['week','month','quarter','last_quarter','year','compare'].map(p => `
          <button class="period-tab ${p === currentPeriod ? 'active' : ''}" onclick="selectPeriod('${p}')">${p === 'compare' ? 'Q vs Q' : PERIOD_LABELS[p]}</button>
        `).join('')}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem">
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem">
        <div style="font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem">Q3 2026 — current</div>
        ${STAT_CONFIG.map(s => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:.5px solid var(--border)">
            <span style="font-size:12px;color:var(--muted)">${s.label}</span>
            <span style="font-size:14px;font-weight:600;color:var(--text)">${cq[s.key] ?? 0}${delta(cq[s.key]??0, lq[s.key]??0)}</span>
          </div>`).join('')}
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem">Q2 2026 — last quarter</div>
        ${STAT_CONFIG.map(s => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:.5px solid var(--border)">
            <span style="font-size:12px;color:var(--muted)">${s.label}</span>
            <span style="font-size:14px;font-weight:600;color:var(--muted)">${lq[s.key] ?? 0}</span>
          </div>`).join('')}
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-header">
        <div class="chart-title">Quarter vs quarter — all metrics</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#4f7cff"></div>Q3 2026</div>
            <div class="legend-item"><div class="legend-dot" style="background:#374151"></div>Q2 2026</div>
          </div>
          <div style="display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:3px">
            <button onclick="setChartType('bar')" style="padding:4px 10px;border-radius:6px;border:none;font-size:11px;cursor:pointer;background:${currentChartType==='bar'?'var(--card)':'transparent'};color:${currentChartType==='bar'?'var(--text)':'var(--muted)'}">Bar</button>
            <button onclick="setChartType('pie')" style="padding:4px 10px;border-radius:6px;border:none;font-size:11px;cursor:pointer;background:${currentChartType==='pie'?'var(--card)':'transparent'};color:${currentChartType==='pie'?'var(--text)':'var(--muted)'}">Pie</button>
          </div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="activity-chart"></canvas></div>
    </div>

    <div class="page-footer">
      <div class="footer-text">BidMachine Supply Sales Dashboard · data via HubSpot API</div>
      <a class="footer-link" href="https://app.hubspot.com/contacts/5606823/objects/0-3/?hubspot_owner_id=${rep.rep.id}" target="_blank" rel="noopener">View in HubSpot ↗</a>
    </div>`;

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const ctx = document.getElementById('activity-chart');
  if (!ctx || !cd) return;

  if (currentChartType === 'pie') {
    // Pie shows current quarter breakdown by metric
    const labels = ['Deals touched','New deals','Qual. out','Meetings','LinkedIn','New cos','Tier 1 DAU','Peer SDK'];
    const values = [cq.deals_touched, cq.new_deals, cq.qualified_out, cq.meetings, cq.linkedin, cq.new_companies, cq.dau_tier1_added, cq.peer_sdk];
    const PIE_COLORS = ['#4f7cff','#34d399','#f87171','#a78bfa','#0ea5e9','#f59e0b','#6ee7b7','#c084fc'];
    chartInstance = new Chart(ctx, {
      type: 'pie',
      data: {
        labels,
        datasets: [{ data: values, backgroundColor: PIE_COLORS, borderColor: '#0f1117', borderWidth: 2 }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { color: '#9ca3af', font: { size: 11 }, padding: 12, boxWidth: 12 } },
          tooltip: { backgroundColor: '#1e2336', titleColor: '#e8eaf0', bodyColor: '#9ca3af', borderColor: '#2a2f45', borderWidth: 1 },
        },
      },
    });
  } else {
    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: cd.labels,
        datasets: [
          { label: 'Q3 2026', data: cd.current,  backgroundColor: '#4f7cff', borderRadius: 4, borderSkipped: false },
          { label: 'Q2 2026', data: cd.previous, backgroundColor: '#374151', borderRadius: 4, borderSkipped: false },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: '#1e2336', titleColor: '#e8eaf0', bodyColor: '#9ca3af', borderColor: '#2a2f45', borderWidth: 1 },
        },
        scales: {
          x: { grid: { color: '#2a2f45' }, ticks: { color: '#6b7280', font: { size: 11 } } },
          y: { grid: { color: '#2a2f45' }, ticks: { color: '#6b7280', font: { size: 11 }, precision: 0 }, beginAtZero: true },
        },
      },
    });
  }
}


function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

function showAddRepInfo() {
  document.getElementById('drawer-title').textContent = 'Add a sales rep';
  document.getElementById('drawer-count').textContent = '';
  document.getElementById('drawer-body').innerHTML = `
    <div class="drawer-item" style="border:none">
      <div style="font-size:13px;color:var(--muted);line-height:1.7">
        <p style="margin-bottom:12px">To add another rep to this dashboard:</p>
        <ol style="padding-left:1.2rem;display:flex;flex-direction:column;gap:8px">
          <li>Open <code style="background:var(--card);padding:2px 6px;border-radius:4px">fetch_data.py</code></li>
          <li>Find their HubSpot owner ID (ask Claude or check HubSpot)</li>
          <li>Add a line to the <code style="background:var(--card);padding:2px 6px;border-radius:4px">REPS</code> list:<br>
            <code style="background:var(--card);padding:4px 8px;border-radius:4px;display:block;margin-top:6px">{"id": "OWNER_ID", "name": "Full Name"}</code>
          </li>
          <li>Run <code style="background:var(--card);padding:2px 6px;border-radius:4px">python fetch_data.py</code> and push</li>
        </ol>
      </div>
    </div>`;
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

boot();
</script>
</body>
</html>
